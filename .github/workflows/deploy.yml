name: Deploy to Cloudflare Pages

# Builds the static export and deploys it to Cloudflare Pages on every push to
# master (and on manual dispatch). Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN  — a token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account id
# See DEPLOY.md for how to create both.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npx next build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # First run auto-creates the "nishalcr-portfolio" project; the URL
          # becomes https://nishalcr-portfolio.pages.dev
          command: pages deploy out --project-name=nishalcr-portfolio --branch=master
