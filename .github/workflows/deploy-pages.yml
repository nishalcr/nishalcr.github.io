name: Deploy to GitHub Pages

# Builds the static export and deploys it to GitHub Pages on every push to
# master (and on manual dispatch). One-time setup: repo Settings → Pages →
# Source: "GitHub Actions". Custom domain (nishalcr.is-a.dev) is baked into the
# artifact via the CNAME file below.

on:
  push:
    branches: [master]
  workflow_dispatch:

# Least-privilege permissions required by the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; let in-progress ones finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Never deploy a non-master branch to the single Pages environment, even via
    # a manual workflow_dispatch.
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Prepare Pages artifact
        # .nojekyll stops Jekyll from ignoring Next's _next/ folder. No CNAME
        # file: the site serves at the user-site root https://nishalcr.github.io.
        # (To attach the nishalcr.is-a.dev custom domain later, add it in repo
        # Settings → Pages, or re-introduce a CNAME file — see DEPLOY.md.)
        run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
